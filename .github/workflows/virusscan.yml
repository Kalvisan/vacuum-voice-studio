name: VirusScan

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  virusscan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run repository source scan
        run: python3 scripts/repo_virusscan.py --json

      - name: Install ClamAV
        run: sudo apt-get update && sudo apt-get install -y clamav clamav-freshclam

      - name: Update ClamAV signatures
        run: sudo freshclam || true

      - name: Run ClamAV scan
        run: python3 scripts/repo_virusscan.py --clamav --json
